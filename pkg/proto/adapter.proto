syntax = "proto3";

package sigilbridge.adapter.v1;

option go_package = "github.com/sigilbridge/sigilbridge/pkg/proto";

service ProviderPlugin {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc Stream(ChatRequest) returns (stream StreamEvent);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ChatRequest {
  string provider_id = 1;
  bytes request_json = 2;
  bytes config_json = 3;
}

message ChatResponse {
  bytes response_json = 1;
}

message StreamEvent {
  bytes event_json = 1;
}

message HealthRequest {
  string provider_id = 1;
  bytes config_json = 2;
}

message HealthResponse {
  bool ok = 1;
  string message = 2;
}

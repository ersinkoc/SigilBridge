name: UI Types Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ui-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
      - name: Generate types
        run: go run ./cmd/gentypes
      - name: Check generated types are committed
        run: git diff --exit-code -- ui/src/types/api.ts
      - name: Check UI
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint
